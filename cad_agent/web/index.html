<!doctype html>
<meta charset="utf-8">
<title>cad-agent</title>
<style>
  body { margin: 0; display: flex; height: 100vh; font-family: system-ui; }
  #view { flex: 1; background: #1a1a1a; }
  #side { width: 360px; display: flex; flex-direction: column; border-left: 1px solid #ccc; }
  #log { flex: 1; overflow: auto; padding: 8px; font: 12px/1.4 monospace; white-space: pre-wrap; }
  #row { display: flex; padding: 8px; gap: 6px; }
  #msg { flex: 1; }
</style>
<div id="view"></div>
<div id="side">
  <div id="log"></div>
  <div id="row">
    <input type="file" id="photo" accept="image/*" style="flex:1" title="拍照/上傳實物照,AI 逆向建模">
  </div>
  <div id="row">
    <span id="basephoto" style="flex:1; font:12px monospace; color:#888"></span>
    <button id="reset" title="清除基準照片與目前模型,從頭開始">重設</button>
  </div>
  <div id="row">
    <input id="msg" placeholder="描述,或上傳照片後在此補充尺寸/備註">
    <button id="go">建</button>
  </div>
  <div id="row">
    <button id="toRender" style="flex:1" title="用 render-studio 渲染最近建好的模型">送去 render-studio 渲染</button>
  </div>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { STLLoader } from "three/addons/loaders/STLLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const view = document.getElementById("view");
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, view.clientWidth / view.clientHeight, 0.1, 5000);
cam.position.set(120, 120, 120);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(view.clientWidth, view.clientHeight);
view.appendChild(renderer.domElement);
const controls = new OrbitControls(cam, renderer.domElement);
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1); dir.position.set(1, 1, 1); scene.add(dir);
scene.add(new THREE.GridHelper(200, 20));
let mesh = null;
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, cam); })();

const loader = new STLLoader();
function loadStl(url){
  loader.load(url + "?t=" + Date.now(), geo => {
    if (mesh) scene.remove(mesh);
    geo.center();
    mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x66aaff, metalness: 0.1, roughness: 0.6 }));
    scene.add(mesh);
  });
}

const log = document.getElementById("log");
function line(t){ log.textContent += t + "\n"; log.scrollTop = log.scrollHeight; }

const es = new EventSource("/events");
es.onmessage = e => {
  const ev = JSON.parse(e.data);
  if (ev.type === "script") line("--- script ---\n" + ev.script);
  else if (ev.type === "model") loadStl(ev.stl);
  else if (ev.type === "error") line("[error] " + ev.stderr);
};

async function send(){
  const msg = document.getElementById("msg").value.trim();
  const photo = document.getElementById("photo").files[0];
  if (!msg && !photo) { line("describe a part or pick a photo"); return; }
  line(photo ? ("> [photo] " + (msg || "")) : ("> " + msg));
  const fd = new FormData();
  fd.append("message", msg);
  if (photo) fd.append("image", photo);
  await fetch("/build", { method: "POST", body: fd });
  refreshSession();
}
document.getElementById("go").onclick = send;
document.getElementById("msg").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
// open render-studio; it loads the latest built model from the shared handoff
document.getElementById("toRender").onclick = () =>
  window.open("http://127.0.0.1:8098/?from=cad-agent", "_blank");
async function refreshSession(){
  try {
    const s = await (await fetch("/session")).json();
    document.getElementById("basephoto").textContent =
      s.image ? ("基準照片:" + s.image + "(換照片或重設清除)") : "";
  } catch (e) { /* ignore */ }
}
document.getElementById("reset").onclick = async () => {
  await fetch("/reset", { method: "POST" });
  document.getElementById("photo").value = "";
  document.getElementById("msg").value = "";
  refreshSession();
  line("已重設,從頭開始");
};
refreshSession();
</script>
